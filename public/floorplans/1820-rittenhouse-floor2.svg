<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#faf9f6"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a">1820 Rittenhouse Sq — Second Floor</text>
  <!-- Outer walls -->
  <rect x="50" y="50" width="700" height="500" stroke="#1a1a1a" stroke-width="3" fill="none"/>
  <!-- Primary Suite -->
  <rect x="50" y="50" width="400" height="300" stroke="#1a1a1a" stroke-width="2" fill="#f0ebe3"/>
  <text x="250" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Primary Suite</text>
  <text x="250" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">24' × 20'</text>
  <!-- En-Suite Bath -->
  <rect x="50" y="350" width="200" height="200" stroke="#1a1a1a" stroke-width="2" fill="#d8d4cc"/>
  <text x="150" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">En-Suite Bath</text>
  <text x="150" y="473" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">12' × 14'</text>
  <!-- Walk-in Closet -->
  <rect x="250" y="350" width="200" height="200" stroke="#1a1a1a" stroke-width="2" fill="#e8e2d8"/>
  <text x="350" y="455" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Walk-in Closet</text>
  <text x="350" y="473" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">12' × 14'</text>
  <!-- Bedroom 2 -->
  <rect x="450" y="50" width="300" height="220" stroke="#1a1a1a" stroke-width="2" fill="#e0dcd4"/>
  <text x="600" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Bedroom 2</text>
  <text x="600" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">18' × 15'</text>
  <!-- Full Bath -->
  <rect x="450" y="270" width="150" height="130" stroke="#1a1a1a" stroke-width="2" fill="#d8d4cc"/>
  <text x="525" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Full Bath</text>
  <!-- Hallway -->
  <rect x="450" y="400" width="300" height="150" stroke="#1a1a1a" stroke-width="2" fill="#f0ebe3"/>
  <text x="600" y="480" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#555">Landing / Hall</text>
  <!-- Stairs indicator -->
  <rect x="630" y="430" width="80" height="60" stroke="#b8860b" stroke-width="1.5" fill="none"/>
  <line x1="640" y1="440" x2="700" y2="440" stroke="#b8860b" stroke-width="1"/>
  <line x1="640" y1="450" x2="700" y2="450" stroke="#b8860b" stroke-width="1"/>
  <line x1="640" y1="460" x2="700" y2="460" stroke="#b8860b" stroke-width="1"/>
  <line x1="640" y1="470" x2="700" y2="470" stroke="#b8860b" stroke-width="1"/>
  <line x1="640" y1="480" x2="700" y2="480" stroke="#b8860b" stroke-width="1"/>
  <text x="670" y="500" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Stairs</text>
  <!-- Scale -->
  <line x1="600" y1="570" x2="700" y2="570" stroke="#555" stroke-width="1"/>
  <text x="650" y="585" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">10 ft</text>
</svg>
